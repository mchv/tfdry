#
# Scheduled govulncheck run. The CI workflow already runs govulncheck
# on every PR via `make verify`, so this catches the *temporal* class
# of vulnerabilities: a dependency that was clean when last merged but
# has had a new CVE filed against it since. Surfaces those as a failing
# build on the schedule so they don't slumber unnoticed.

name: govulncheck

on:
  push:
    branches: [main]
  schedule:
    # Daily at 07:00 UTC — runs an hour after CodeQL's Monday job so
    # the two scans don't pile onto the same runner pool.
    - cron: "0 7 * * *"
  # Allow manual runs from the Actions tab for ad-hoc audits.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.3
          cache: true

      - name: Install govulncheck (pinned)
        run: make tools

      - name: Run govulncheck
        run: make vuln
