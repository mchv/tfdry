# SPDX-License-Identifier: Apache-2.0
#
# CodeQL security analysis for tfdry's Go source. Runs on every push to
# main, every PR, and weekly so dormant branches still benefit from
# new query packs that GitHub ships between PRs.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:00 UTC. Off-peak for both EU and US business hours.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  # Required by github/codeql-action to publish results to the Security
  # tab. No write access to repo contents.
  security-events: write
  # Required for private repos; harmless on public ones.
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Skip on private repositories. CodeQL on private repos requires
    # GitHub Advanced Security (a paid add-on), and the underlying
    # 'github/codeql-action/analyze' step otherwise fails with
    # 'Code scanning is not enabled for this repository.' Public repos
    # get CodeQL free, so the job activates automatically the moment
    # tfdry flips to public visibility — no workflow edit needed.
    if: github.event.repository.private == false
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # tfdry is Go-only today. If a future tool adds Python/JS
        # (e.g. a benchmark harness), extend this list.
        language: [go]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds queries beyond the default set
          # (e.g. extra taint-flow analyses). `security-and-quality`
          # would also include style/maintainability queries — too
          # noisy for what's effectively a redundant signal against
          # golangci-lint, so we stick with the security-focused pack.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
