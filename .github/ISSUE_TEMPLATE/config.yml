blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/mchv/tfdry/security/advisories/new
    about: |
      Please report security vulnerabilities privately via GitHub Security
      Advisories rather than opening a public issue.
  - name: Question or discussion
    url: https://github.com/mchv/tfdry/issues?q=is%3Aissue
    about: |
      For questions, please search existing issues first. If your question
      isn't covered, open a regular issue using the bug or feature template
      that fits best.
